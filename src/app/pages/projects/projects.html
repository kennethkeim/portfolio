<div id="body">

   <app-navbar></app-navbar>

   <div class="wrapper">

      <div id="featProject">

         <div class="mycard">
            <img [src]="featProject.image" alt="photo of featured project">
            <a target="_blank" rel="noopener noreferrer" [href]="featProject.link" class="href proj-name">{{ featProject.name }}</a>
            <small>{{ featProject.shortDesc }}</small>
            <p>{{ featProject.problem }}</p>
            <p>{{ featProject.solution }}</p>
         </div>

      </div>

      <!-- <div id="projects">
         <div *ngFor="let proj of projects" class="mycard"></div>
      </div> -->
   </div>

   <app-footer></app-footer>

</div>
