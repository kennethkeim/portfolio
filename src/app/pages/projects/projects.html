<div id="body">

   <app-navbar></app-navbar>

   <div class="wrapper">
      <div id="projects">


         <div *ngFor="let proj of projects" class="mycard">

            <img [src]="proj.image" alt="photo of a past project">

            <a target="_blank" rel="noopener noreferrer" [href]="proj.link">
               {{ proj.name }}
            </a>

            <small>{{ proj.shortDesc }}</small>
            <p>{{ proj.problem }}</p>
            <p>{{ proj.solution }}</p>

         </div>


      </div>
   </div>

   <app-footer></app-footer>

</div>
